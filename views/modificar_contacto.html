$def with (contacto)
<form method="post" action="/modificar_contacto/$contacto['id_contacto']">
    <label>ID</label> 
    <input type="text" name="id" value="$contacto['id_contacto']" readonly> <br>
    
    <label>Nombre</label> 
    <input type="text" name="name" value="$contacto['nombre']"> <br>
    
    <label>Primer apellido</label> 
    <input type="text" name="f_lastname" value="$contacto['primer_apellido']"> <br>
    
    <label>Segundo apellido</label> 
    <input type="text" name="s_lastname" value="$contacto['segundo_apellido']"> <br>
    
    <label>Email</label> 
    <input type="text" name="email" value="$contacto['email']"> <br>
    
    <label>Telefono</label> 
    <input type="text" name="tel" value="$contacto['telefono']"> <br>
    
    <button type="submit">Guardar Cambios</button>
    <a href="/"><button type="button">Regresar</button></a>
</form>
