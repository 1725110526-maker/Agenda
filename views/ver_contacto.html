$def with (contacto)

<h2>Ver Contacto</h2>

<div>
    <label for="id_contacto">ID:</label>
    <input type="text" id="id_contacto" value="$contacto['id_contacto']" readonly><br><br>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" value="$contacto['nombre']" readonly><br><br>

    <label for="primer_apellido">Primer Apellido:</label>
    <input type="text" id="primer_apellido" value="$contacto['primer_apellido']" readonly><br><br>

    <label for="segundo_apellido">Segundo Apellido:</label>
    <input type="text" id="segundo_apellido" value="$contacto['segundo_apellido']" readonly><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" value="$contacto['email']" readonly><br><br>

    <label for="telefono">Teléfono:</label>
    <input type="text" id="telefono" value="$contacto['telefono']" readonly><br><br>

    <a href="/"><button type="button">Regresar</button></a>
</div>
